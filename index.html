<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Predictor Pro - Bet261 Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e16; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background-color: #161926; border-radius: 12px; }
        .btn-red { background-color: #ef4444; transition: 0.3s; }
        .btn-red:hover { background-color: #dc2626; transform: scale(1.02); }
        .input-dark { background-color: #0b0e16; border: 1px solid #25283b; }
        .table-header { color: #666; font-size: 11px; font-weight: bold; border-bottom: 1px solid #25283b; }
        .row { border-bottom: 1px solid #1f2233; transition: 0.2s; }
        .row:hover { background-color: #1c1f2e; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen flex flex-col">

    <div class="flex justify-between items-center p-5 bg-[#161926] sticky top-0 z-10 shadow-lg">
        <span class="text-[#facc15] text-2xl cursor-pointer">☰</span>
        <h1 class="font-bold tracking-tighter text-lg">BETTING TIPS</h1>
        <div class="bg-[#25283b] px-3 py-1 rounded-full flex items-center gap-1">
            <span class="text-xs">🪙 39,995</span>
        </div>
    </div>

    <div class="p-4 flex-grow">
        <div class="card p-5 mb-6 shadow-xl">
            <div class="flex items-center gap-2 mb-4">
                <span class="text-red-500 text-lg">🚀</span>
                <h2 class="text-sm font-semibold">Analyse Aviator (Bet261)</h2>
            </div>
            
            <textarea id="historyInput" 
                class="w-full h-28 input-dark rounded-lg p-3 text-sm text-blue-400 focus:outline-none focus:ring-1 focus:ring-red-500" 
                placeholder="Adikao eto ny isa (ohatra: 1.52 11.51 46.88 5.20...)"></textarea>
            
            <button onclick="generatePredictions()" class="w-full btn-red mt-5 py-4 rounded-lg font-bold text-sm shadow-lg uppercase tracking-wider">
                🔍 Generer les predictions (1 Token)
            </button>
        </div>

        <div class="mb-4 flex justify-between items-center">
            <h3 class="text-sm font-bold">Prédictions Aviator</h3>
            <span class="text-[10px] text-gray-500 uppercase">En direct</span>
        </div>

        <div class="grid grid-cols-4 table-header pb-3 text-center">
            <div>HEURE</div>
            <div>COTE 1</div>
            <div>COTE 2</div>
            <div>RISQUE</div>
        </div>

        <div id="resultsList" class="pb-24">
            <div class="text-center py-10 text-gray-600 text-xs italic">
                Ampidiro ny history vao manindry "Generer"
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 h-20 bg-[#161926] border-t border-[#25283b] flex justify-around items-center text-[10px] text-gray-500 font-bold max-w-md mx-auto">
        <div class="flex flex-col items-center gap-1 cursor-pointer">
            <span>🔥</span><span>Tips</span>
        </div>
        <div class="flex flex-col items-center gap-1 cursor-pointer">
            <span>📈</span><span>Virtual</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-[#facc15] cursor-pointer">
            <span>🚀</span><span>Aviator</span>
        </div>
        <div class="flex flex-col items-center gap-1 cursor-pointer">
            <span>💎</span><span>VIP</span>
        </div>
    </div>

    <script>
        // Ny Loko araka ny Bet261
        function getCoteColor(val) {
            const v = parseFloat(val);
            if (v < 2.00) return "#4da6ff";    // Blue (Manga)
            if (v < 10.00) return "#9333ea";   // Violet (Volomparasy)
            if (v <= 50.00) return "#ff45e0";  // Rose (Pink)
            return "#10b981";                  // Vert (Maintso - Fara-tampony)
        }

        function generatePredictions() {
            const input = document.getElementById('historyInput').value;
            const list = document.getElementById('resultsList');
            
            // Raha tsy misy isa nampidirina
            if (!input.trim()) {
                alert("Azafady, ampidiro aloha ny isa nivoaka farany!");
                return;
            }

            list.innerHTML = ""; 
            let now = new Date();

            for (let i = 1; i <= 10; i++) {
                // Kajy ny ora miaraka amin'ny segondra
                let predictTime = new Date(now.getTime() + (i * 140000) + (Math.floor(Math.random() * 59) * 1000));
                const h = predictTime.getHours().toString().padStart(2, '0');
                const m = predictTime.getMinutes().toString().padStart(2, '0');
                const s = predictTime.getSeconds().toString().padStart(2, '0');
                const timeStr = `${h}:${m}:${s}`;
                
                // Simulation ny isa
                const c1 = (1.1 + Math.random() * 3).toFixed(2);
                const c2 = (2.0 + Math.random() * 12).toFixed(2);
                const risk = (parseFloat(c2) * (1.5 + Math.random() * 40)).toFixed(2);

                list.innerHTML += `
                    <div class="grid grid-cols-4 py-5 row text-center items-center">
                        <div class="text-gray-400 text-xs">${timeStr}</div>
                        <div class="font-bold text-xs" style="color: ${getCoteColor(c1)}">${c1}x</div>
                        <div class="font-bold text-xs" style="color: ${getCoteColor(c2)}">${c2}x</div>
                        <div class="font-bold text-sm" style="color: ${getCoteColor(risk)}">${risk}x</div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
