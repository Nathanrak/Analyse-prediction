<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betting Tips Pro - Detailed Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1425; color: #a0aec0; font-family: 'Inter', sans-serif; }
        .card { background-color: #162238; border-radius: 12px; border: 1px solid #1f2d47; }
        .text-cyan { color: #4fd1c5; }
        .text-yellow { color: #f6e05e; }
        .input-box { background-color: #0b1425; border: 1px solid #2d3748; color: white; }
        .btn-analyze { background-color: #e53e3e; color: white; font-weight: bold; }
        .active-tab { color: #f6e05e; border-bottom: 2px solid #f6e05e; }
        .hidden { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto pb-24">

    <div class="p-4 flex justify-between items-center bg-[#0b1425] sticky top-0 z-50 border-b border-gray-800">
        <div class="bg-yellow-500 text-black px-2 py-1 rounded text-[10px] font-bold">☰ MENU</div>
        <h1 class="text-white font-bold text-sm">Betting Tips</h1>
        <div class="text-[11px] text-gray-400">🪙 4998</div>
    </div>

    <div id="main-content" class="p-4">
        
        <div id="selection-page" class="space-y-4">
            <h2 class="text-[10px] uppercase font-bold tracking-widest text-gray-500">Ligy azo isafidianana</h2>
            <div class="grid grid-cols-1 gap-2">
                <button onclick="openInput('English League')" class="w-full bg-[#162238] p-4 rounded-lg text-left text-white text-sm flex justify-between">
                    <span>🏴󠁧󠁢󠁥󠁮󠁧󠁿 English League</span> <span>→</span>
                </button>
                <button onclick="openInput('Coupe d\'Afrique')" class="w-full bg-[#162238] p-4 rounded-lg text-left text-white text-sm flex justify-between">
                    <span>🌍 Coupe d'Afrique</span> <span>→</span>
                </button>
            </div>
        </div>

        <div id="input-page" class="hidden space-y-4">
            <button onclick="showPage('selection-page')" class="text-[10px] text-gray-500">← MIVERINA</button>
            <div class="card p-5">
                <h3 id="league-title" class="text-white font-bold mb-4">Ligy</h3>
                <textarea id="matchInput" class="w-full h-32 input-box rounded-lg p-3 text-xs mb-4" placeholder="Home vs Away"></textarea>
                <button onclick="processPoisson()" class="w-full btn-analyze py-3 rounded-lg text-xs uppercase tracking-tighter">HIKAJY NY VALINY (POISSON)</button>
            </div>
        </div>

        <div id="results-page" class="hidden space-y-4">
            <div id="results-container"></div>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-[#162238] h-16 flex justify-around items-center max-w-md mx-auto border-t border-gray-800">
        <div class="text-center opacity-50"><p class="text-xs">🔥</p><p class="text-[8px]">TIPS</p></div>
        <div class="text-center active-tab"><p class="text-xs">📈</p><p class="text-[8px]">VIRTUAL</p></div>
        <div class="text-center opacity-50"><p class="text-xs">🚀</p><p class="text-[8px]">AVIATOR</p></div>
        <div class="text-center opacity-50"><p class="text-xs">💎</p><p class="text-[8px]">VIP</p></div>
    </div>

    <script>
        let selectedLigue = "";

        function showPage(id) {
            document.getElementById('selection-page').classList.add('hidden');
            document.getElementById('input-page').classList.add('hidden');
            document.getElementById('results-page').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function openInput(ligue) {
            selectedLigue = ligue;
            document.getElementById('league-title').innerText = ligue;
            showPage('input-page');
        }

        function poisson(x, mean) {
            return (Math.pow(mean, x) * Math.exp(-mean)) / factorial(x);
        }

        function factorial(n) {
            if (n === 0) return 1;
            let res = 1;
            for (let i = 1; i <= n; i++) res *= i;
            return res;
        }

        function processPoisson() {
            const input = document.getElementById('matchInput').value.trim();
            if(!input) return;

            const matches = input.split('\n');
            const container = document.getElementById('results-container');
            container.innerHTML = `<button onclick="showPage('input-page')" class="text-[10px] mb-4">← ANALYSE VAOVAO</button>`;

            matches.forEach(m => {
                const teams = m.split(/vs/i);
                const home = teams[0].trim();
                const away = teams[1] ? teams[1].trim() : "Away";

                // Simulation de force basée sur Poisson
                const hMean = 1.2 + Math.random();
                const aMean = 0.8 + Math.random();

                let maxP = 0; let s1 = 0; let s2 = 0;
                for (let x = 0; x <= 4; x++) {
                    for (let y = 0; y <= 4; y++) {
                        let p = poisson(x, hMean) * poisson(y, aMean);
                        if(p > maxP) { maxP = p; s1 = x; s2 = y; }
                    }
                }

                container.innerHTML += `
                <div class="card p-4 mb-6 relative overflow-hidden">
                    <div class="absolute top-0 right-0 bg-red-600 text-white text-[7px] px-2 py-0.5 font-bold uppercase">Hot Match</div>
                    
                    <div class="flex justify-between items-center mb-4 pt-2">
                        <div class="text-white font-bold text-xs uppercase">${home}</div>
                        <div class="text-gray-600 italic text-[10px]">VS</div>
                        <div class="text-white font-bold text-xs uppercase text-right">${away}</div>
                    </div>

                    <div class="w-full bg-gray-800 h-1 mb-6 rounded-full overflow-hidden flex">
                        <div class="bg-cyan-400 h-full" style="width: 70%"></div>
                        <div class="bg-red-500 h-full" style="width: 30%"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-x-8 gap-y-4 text-[10px] font-medium">
                        <div class="flex justify-between border-b border-gray-700 pb-1"><span>1X2:</span> <span class="text-cyan">${s1 > s2 ? '1' : (s1 < s2 ? '2' : 'X')}</span></div>
                        <div class="flex justify-between border-b border-gray-700 pb-1"><span>1X2 MT:</span> <span class="text-cyan">1</span></div>
                        
                        <div class="flex justify-between border-b border-gray-700 pb-1"><span>DC:</span> <span class="text-cyan">12</span></div>
                        <div class="flex justify-between border-b border-gray-700 pb-1"><span>DC MT:</span> <span class="text-white">X2</span></div>
                        
                        <div class="flex justify-between border-b border-gray-700 pb-1"><span>Score Exact:</span> <span class="text-yellow">${s1}-${s2}</span></div>
                        <div class="flex justify-between border-b border-gray-700 pb-1"><span>Score MT:</span> <span class="text-white">${Math.floor(s1/2)}-${Math.floor(s2/2)}</span></div>
                        
                        <div class="flex justify-between border-b border-gray-700 pb-1"><span>O/U 0.5:</span> <span class="text-white">Over</span></div>
                        <div class="flex justify-between border-b border-gray-700 pb-1"><span>O/U 1.5:</span> <span class="text-white">Over</span></div>
                        
                        <div class="flex justify-between border-b border-gray-700 pb-1"><span>O/U 2.5:</span> <span class="text-white">${(s1+s2) > 2.5 ? 'Over' : 'Under'}</span></div>
                        <div class="flex justify-between border-b border-gray-700 pb-1"><span>O/U 3.5:</span> <span class="text-white">Under</span></div>
                        
                        <div class="flex justify-between border-b border-gray-700 pb-1"><span>HT/FT:</span> <span class="text-cyan">X/X</span></div>
                        <div class="flex justify-between border-b border-gray-700 pb-1"><span>Total Buts:</span> <span class="text-white">${s1+s2}</span></div>
                        
                        <div class="flex justify-between border-b border-gray-700 pb-1"><span>GG/NG:</span> <span class="text-cyan">GG</span></div>
                        <div class="flex justify-between border-b border-gray-700 pb-1"><span>BTTS:</span> <span class="text-yellow">${(s1>0 && s2>0) ? 'Yes' : 'No'}</span></div>
                        
                        <div class="flex justify-between border-b border-gray-700 pb-1"><span>1er But Min:</span> <span class="text-white">42'</span></div>
                        <div class="flex justify-between border-b border-gray-700 pb-1"><span>Multi-buts:</span> <span class="text-white">1-3</span></div>
                    </div>

                    <div class="mt-4 pt-2 text-center text-[8px] tracking-widest uppercase text-gray-500">
                        Confidence: 69% | Analyse Feno
                    </div>
                </div>`;
            });

            showPage('results-page');
        }
    </script>
</body>
</html>
