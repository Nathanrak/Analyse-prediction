<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betting Tips Pro - Madagascar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b101b; color: white; font-family: sans-serif; overflow-x: hidden; }
        .card { background-color: #1a2235; border-radius: 15px; border: 1px solid #2d3748; }
        .input-box { background-color: #0b101b; border: 1px solid #3d465a; color: #cbd5e0; }
        .active-nav { color: #facc15; }
        .btn-yellow { background-color: #facc15; color: black; font-weight: bold; }
        .btn-red { background-color: #ef4444; color: white; font-weight: bold; }
        .hidden { display: none; }
        .hot-badge { background-color: #ef4444; font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-24">

    <div class="p-5 flex justify-between items-center sticky top-0 bg-[#0b101b] z-50">
        <div class="bg-[#facc15] p-2 rounded-lg text-black font-bold text-xs uppercase">Bet261 Edition</div>
        <div class="flex items-center gap-2 bg-[#1a2235] px-3 py-1 rounded-full border border-gray-700 shadow-inner">
            <span class="text-yellow-500">🪙</span>
            <span class="text-xs font-bold">4998</span>
            <span class="text-yellow-500 ml-1">🛒</span>
        </div>
    </div>

    <div id="main-app" class="px-4">

        <div id="virtuel-input" class="space-y-4">
            <div class="card p-5">
                <div class="flex items-center gap-2 mb-3">
                    <span class="bg-cyan-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-[10px] font-bold">1</span>
                    <h2 class="font-bold text-xs text-gray-400">HISTORIQUE</h2>
                </div>
                <textarea class="w-full h-20 input-box rounded-xl p-3 text-[11px] focus:outline-none" placeholder="Collez l'historique ici..."></textarea>
                <button class="w-full bg-[#2d3748] mt-3 py-2 rounded-xl text-[10px] font-semibold">💾 SAUVEGARDER L'HISTORIQUE</button>
            </div>

            <div class="card p-5 border-t-2 border-yellow-500">
                <div class="flex items-center gap-2 mb-3">
                    <span class="bg-yellow-500 text-black rounded-full w-5 h-5 flex items-center justify-center text-[10px] font-bold">2</span>
                    <h2 class="font-bold text-xs text-gray-400">NOUVELLE ANALYSE</h2>
                </div>
                <textarea id="virtuelMatch" class="w-full h-20 input-box rounded-xl p-3 text-[11px] focus:outline-none" placeholder="London Blues vs Bournemouth | 1.52 | 3.50 | 4.10"></textarea>
                <button onclick="runVirtuelAnalyse()" class="w-full btn-yellow mt-4 py-4 rounded-xl text-xs shadow-lg active:scale-95 transition">🔍 ANALYSER LES MATCHS</button>
            </div>
        </div>

        <div id="virtuel-result" class="hidden animate-fade-in">
            <button onclick="showVirtuelInput()" class="text-[10px] text-gray-500 mb-3 flex items-center gap-1">← MIVERINA AMIN'NY ANALYSE</button>
            <div id="detailedStatsContainer"></div>
        </div>

        <div id="aviator-section" class="hidden space-y-4">
            <div class="card p-5">
                <div class="flex items-center gap-2 mb-3 text-red-500">
                    <span class="text-lg">🚀</span>
                    <h2 class="font-bold text-xs uppercase italic">Aviator Analyse Pro</h2>
                </div>
                <textarea id="aviatorHist" class="w-full h-24 input-box rounded-xl p-3 text-[11px] text-blue-400 font-bold" placeholder="Adikao eto ny isa (ohatra: 1.40 12.33 102.79...)"></textarea>
                <button onclick="runAviatorAnalyse()" class="w-full btn-red mt-4 py-4 rounded-xl text-xs uppercase tracking-widest shadow-lg">🔥 GENERER PREDICTIONS</button>
            </div>
            <div id="aviatorResults" class="hidden">
                 <div class="grid grid-cols-4 text-[9px] text-gray-500 font-bold text-center mb-2">
                    <div>HEURE</div><div>COTE 1</div><div>COTE 2</div><div>RISQUE</div>
                 </div>
                 <div id="aviatorList" class="space-y-1"></div>
            </div>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-[#1a2235] h-20 border-t border-gray-800 flex justify-around items-center max-w-md mx-auto z-50">
        <div class="flex flex-col items-center gap-1 opacity-40">
            <span class="text-xl">🔥</span><span class="text-[9px] font-bold">TIPS</span>
        </div>
        <div onclick="tabSwitch('virtuel')" id="tab-virtuel" class="flex flex-col items-center gap-1 active-nav cursor-pointer">
            <span class="text-xl">📈</span><span class="text-[9px] font-bold">VIRTUEL</span>
        </div>
        <div onclick="tabSwitch('aviator')" id="tab-aviator" class="flex flex-col items-center gap-1 opacity-40 cursor-pointer text-gray-400">
            <span class="text-xl">🚀</span><span class="text-[9px] font-bold">AVIATOR</span>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-40">
            <span class="text-xl">💎</span><span class="text-[9px] font-bold text-gray-500">VIP</span>
        </div>
    </div>

    <script>
        // NAVIGATION LOGIC
        function tabSwitch(tab) {
            // Reset Sections
            document.getElementById('virtuel-input').classList.add('hidden');
            document.getElementById('virtuel-result').classList.add('hidden');
            document.getElementById('aviator-section').classList.add('hidden');
            
            // Reset Nav Icons
            document.getElementById('tab-virtuel').classList.replace('active-nav', 'opacity-40');
            document.getElementById('tab-aviator').classList.replace('active-nav', 'opacity-40');

            if(tab === 'virtuel') {
                document.getElementById('virtuel-input').classList.remove('hidden');
                document.getElementById('tab-virtuel').classList.replace('opacity-40', 'active-nav');
            } else {
                document.getElementById('aviator-section').classList.remove('hidden');
                document.getElementById('tab-aviator').classList.replace('opacity-40', 'active-nav');
            }
        }

        function showVirtuelInput() {
            document.getElementById('virtuel-result').classList.add('hidden');
            document.getElementById('virtuel-input').classList.remove('hidden');
        }

        // VIRTUEL ANALYSIS (Chelsea Page Style)
        function runVirtuelAnalyse() {
            const matchInput = document.getElementById('virtuelMatch').value;
            if(!matchInput.trim()) return alert("Ampidiro ny ekipa!");

            const teams = matchInput.split('vs');
            const home = teams[0] ? teams[0].trim() : "Home Team";
            const away = teams[1] ? teams[1].trim() : "Away Team";
            const scoreH = Math.floor(Math.random() * 3);
            const scoreA = Math.floor(Math.random() * 2);

            document.getElementById('virtuel-input').classList.add('hidden');
            document.getElementById('virtuel-result').classList.remove('hidden');

            document.getElementById('detailedStatsContainer').innerHTML = `
                <div class="card p-5 relative overflow-hidden border-t-4 border-red-500">
                    <div class="absolute top-0 right-0 p-2"><span class="hot-badge text-white italic">HOT MATCH</span></div>
                    <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4 pt-2">
                        <div class="text-left w-2/5">
                            <p class="text-[8px] text-gray-500 uppercase tracking-widest">English League</p>
                            <p class="font-bold text-xs text-white truncate">${home}</p>
                        </div>
                        <div class="text-center w-1/5 text-gray-600 font-bold text-xs italic">VS</div>
                        <div class="text-right w-2/5">
                            <p class="text-[8px] text-gray-500 uppercase italic">B1 Odds: 1,52</p>
                            <p class="font-bold text-xs text-white truncate">${away}</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-x-6 gap-y-4 text-[10px]">
                        <div class="space-y-3">
                            <div class="flex justify-between border-b border-gray-800 pb-1"><span>1X2:</span> <span class="text-cyan-400 font-bold">1</span></div>
                            <div class="flex justify-between border-b border-gray-800 pb-1"><span>DC:</span> <span class="text-white">12</span></div>
                            <div class="flex justify-between border-b border-gray-800 pb-1"><span>Score Exact:</span> <span class="text-yellow-500 font-bold">${scoreH}-${scoreA}</span></div>
                            <div class="flex justify-between border-b border-gray-800 pb-1"><span>O/U 2.5:</span> <span class="text-white">Under</span></div>
                            <div class="flex justify-between border-b border-gray-800 pb-1"><span>GG/NG:</span> <span class="text-cyan-400">GG</span></div>
                        </div>
                        <div class="space-y-3">
                            <div class="flex justify-between border-b border-gray-800 pb-1"><span>1X2 MT:</span> <span class="text-white">1</span></div>
                            <div class="flex justify-between border-b border-gray-800 pb-1"><span>Score MT:</span> <span class="text-white">1-0</span></div>
                            <div class="flex justify-between border-b border-gray-800 pb-1"><span>BTTS:</span> <span class="text-yellow-500">No</span></div>
                            <div class="flex justify-between border-b border-gray-800 pb-1"><span>Total Buts:</span> <span class="text-white">1</span></div>
                            <div class="flex justify-between border-b border-gray-800 pb-1"><span>1er But Min:</span> <span class="text-white">42'</span></div>
                        </div>
                    </div>
                    <div class="mt-6 flex justify-between items-center text-[9px] text-gray-500">
                         <span>Analyse Confidence: 69%</span>
                         <span class="text-green-500 font-bold uppercase">Safe Match</span>
                    </div>
                </div>`;
        }

        // AVIATOR ANALYSIS (Bet261 Logic)
        function getAviColor(v) {
            if (v < 2) return "#4da6ff"; // Blue
            if (v < 10) return "#9333ea"; // Violet
            if (v <= 50) return "#ff45e0"; // Rose
            return "#10b981"; // Vert
        }

        function runAviatorAnalyse() {
            const list = document.getElementById('aviatorList');
            document.getElementById('aviatorResults').classList.remove('hidden');
            list.innerHTML = "";
            let now = new Date();

            for (let i = 1; i <= 8; i++) {
                let pTime = new Date(now.getTime() + (i * 150000) + (Math.floor(Math.random() * 59) * 1000));
                let timeStr = pTime.getHours().toString().padStart(2, '0') + ":" + pTime.getMinutes().toString().padStart(2, '0') + ":" + pTime.getSeconds().toString().padStart(2, '0');
                
                let c1 = (1.1 + Math.random() * 4).toFixed(2);
                let c2 = (2.0 + Math.random() * 10).toFixed(2);
                let risk = (Math.random() * 80).toFixed(2);

                list.innerHTML += `
                    <div class="grid grid-cols-4 py-3 border-b border-gray-800 text-center items-center">
                        <div class="text-[9px] text-gray-500">${timeStr}</div>
                        <div class="text-[10px] font-bold" style="color:${getAviColor(c1)}">${c1}x</div>
                        <div class="text-[10px] font-bold" style="color:${getAviColor(c2)}">${c2}x</div>
                        <div class="text-[11px] font-bold" style="color:${getAviColor(risk)}">${risk}x</div>
                    </div>`;
            }
        }
    </script>
</body>
</html>
