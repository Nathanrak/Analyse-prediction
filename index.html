<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betting Tips Pro - Poisson Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b101b; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background-color: #1a2235; border-radius: 16px; border: 1px solid #2d3748; position: relative; overflow: hidden; }
        .input-box { background-color: #0b101b; border: 1px solid #3d465a; color: #cbd5e0; transition: 0.3s; }
        .input-box:focus { border-color: #facc15; outline: none; }
        .btn-yellow { background-color: #facc15; color: black; font-weight: 800; transition: 0.2s; }
        .btn-yellow:active { transform: scale(0.96); }
        .active-nav { color: #facc15; border-bottom: 3px solid #facc15; }
        .hidden { display: none; }
        .league-card { padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; text-align: center; font-size: 11px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-analysis { animation: fadeInUp 0.5s ease-out forwards; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-24">

    <div class="p-5 flex justify-between items-center sticky top-0 bg-[#0b101b] z-50 border-b border-gray-900">
        <div class="bg-[#facc15] px-3 py-1.5 rounded-lg text-black font-black text-[10px]">☰ MENU</div>
        <h1 class="text-lg font-black italic tracking-tighter">BETTING<span class="text-yellow-500">PRO</span></h1>
        <div class="bg-[#1a2235] px-3 py-1.5 rounded-full border border-gray-700 text-[11px] flex items-center gap-1">
            <span class="text-yellow-500">🪙</span> <span class="font-bold">4998</span>
        </div>
    </div>

    <div id="main-container" class="px-4 py-4">
        
        <div id="league-page" class="space-y-4">
            <h2 class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.2em]">Select League</h2>
            <div class="grid grid-cols-2 gap-3">
                <div onclick="openAnalyse('English League')" class="league-card bg-red-600 shadow-lg shadow-red-900/20">🇬🇧 English League</div>
                <div onclick="openAnalyse('Coupe d\'Afrique')" class="league-card bg-green-600 shadow-lg shadow-green-900/20">🌍 Coupe d'Afrique</div>
                <div onclick="openAnalyse('Champions League')" class="league-card bg-blue-700 shadow-lg shadow-blue-900/20">🏆 Champions League</div>
                <div onclick="openAnalyse('Italian League')" class="league-card bg-emerald-600 shadow-lg shadow-emerald-900/20">🇮🇹 Italian League</div>
            </div>
            
            <h2 class="text-[10px] text-yellow-500 font-bold uppercase mt-8 tracking-[0.2em]">Fast Leagues (2mn)</h2>
            <div class="space-y-3">
                <div onclick="openAnalyse('English Fast')" class="league-card bg-[#1a2235] border border-gray-700 flex justify-between px-6 items-center">
                    <span class="text-white">🇬🇧 English Fast</span> <span class="text-green-500 font-black text-[9px]">LIVE →</span>
                </div>
                <div onclick="openAnalyse('Spanish Fast')" class="league-card bg-[#1a2235] border border-gray-700 flex justify-between px-6 items-center">
                    <span class="text-white">🇪🇸 Spanish Fast</span> <span class="text-green-500 font-black text-[9px]">LIVE →</span>
                </div>
            </div>
        </div>

        <div id="input-page" class="hidden space-y-4">
            <button onclick="showPage('league-page')" class="text-[10px] text-gray-500 font-bold tracking-widest">← BACK TO LEAGUES</button>
            <div class="card p-6 border-t-4 border-yellow-500">
                <h2 id="current-league-display" class="text-white font-black text-lg mb-6 italic underline decoration-yellow-500 decoration-4 underline-offset-8">League Name</h2>
                
                <div class="space-y-5">
                    <div>
                        <label class="text-[9px] text-gray-400 uppercase font-black block mb-2 tracking-widest text-cyan-400">1. Historical Data (Optional)</label>
                        <textarea class="w-full h-16 input-box rounded-xl p-4 text-[11px]" placeholder="Past results..."></textarea>
                    </div>

                    <div>
                        <label class="text-[9px] text-gray-400 uppercase font-black block mb-2 tracking-widest text-cyan-400">2. Multi-Match Analysis</label>
                        <textarea id="multiMatchInput" class="w-full h-32 input-box rounded-xl p-4 text-[12px] font-medium" 
                            placeholder="Home vs Away&#10;Team A vs Team B&#10;Team C vs Team D"></textarea>
                    </div>

                    <button onclick="runPoissonAnalysis()" class="w-full btn-yellow py-4 rounded-xl text-xs uppercase shadow-2xl hover:bg-yellow-400">
                        ⚡ RUN POISSON CALCULATION
                    </button>
                </div>
            </div>
        </div>

        <div id="result-page" class="hidden space-y-6 pb-20">
            <div class="flex justify-between items-center px-1">
                <button onclick="showPage('input-page')" class="text-[10px] text-gray-500 font-black tracking-tighter uppercase">← NEW ANALYSIS</button>
                <span class="text-[9px] bg-cyan-900/30 text-cyan-400 px-2 py-1 rounded border border-cyan-800 font-bold uppercase">Poisson Model V2.0</span>
            </div>
            <div id="result-list"></div>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-[#0b101b]/95 backdrop-blur-md h-20 border-t border-gray-800 flex justify-around items-center max-w-md mx-auto z-50">
        <div class="flex flex-col items-center gap-1 opacity-30"><span class="text-xl">🔥</span><p class="text-[9px] font-black uppercase">Tips</p></div>
        <div onclick="showPage('league-page')" class="flex flex-col items-center gap-1 active-nav cursor-pointer py-2 px-4"><span class="text-xl">📈</span><p class="text-[9px] font-black uppercase">Virtual</p></div>
        <div class="flex flex-col items-center gap-1 opacity-30"><span class="text-xl">🚀</span><p class="text-[9px] font-black uppercase">Aviator</p></div>
        <div class="flex flex-col items-center gap-1 opacity-30"><span class="text-xl">💎</span><p class="text-[9px] font-black uppercase">VIP</p></div>
    </div>

    <script>
        let currentLeague = "";

        // FORMULA POISSON (Hikajiana ny Probabilité isaky ny score)
        function poisson(x, mean) {
            const e = Math.exp(-mean);
            let factorial = 1;
            for (let i = 1; i <= x; i++) factorial *= i;
            return (Math.pow(mean, x) * e) / factorial;
        }

        function showPage(id) {
            document.querySelectorAll('#main-container > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function openAnalyse(ligue) {
            currentLeague = ligue;
            document.getElementById('current-league-display').innerText = ligue;
            showPage('input-page');
        }

        function runPoissonAnalysis() {
            const text = document.getElementById('multiMatchInput').value.trim();
            if (!text) return alert("Ampidiro ny matches!");

            const matches = text.split('\n');
            const list = document.getElementById('result-list');
            list.innerHTML = "";

            matches.forEach((m, i) => {
                if (m.trim() !== "") {
                    const teams = m.split(/vs/i);
                    const home = teams[0].trim().toUpperCase();
                    const away = teams[1] ? teams[1].trim().toUpperCase() : "AWAY";

                    // FIKAJIANA STATISTIQUES (Poisson Logic)
                    // Ny mean (salan'isa) dia miovaova arakaraka ny match (simulés)
                    const homeMean = 1.3 + (Math.random() * 1.5); 
                    const awayMean = 0.7 + (Math.random() * 1.2);

                    let maxP = 0; let finalS1 = 0; let finalS2 = 0;
                    for (let s1 = 0; s1 <= 4; s1++) {
                        for (let s2 = 0; s2 <= 4; s2++) {
                            let p = poisson(s1, homeMean) * poisson(s2, awayMean);
                            if (p > maxP) { maxP = p; finalS1 = s1; finalS2 = s2; }
                        }
                    }

                    const total = finalS1 + finalS2;
                    const btts = (finalS1 > 0 && finalS2 > 0) ? "YES" : "NO";
                    const oneX2 = finalS1 > finalS2 ? '1' : (finalS1 < finalS2 ? '2' : 'X');

                    list.innerHTML += `
                        <div class="card p-5 mb-5 border-t-4 border-cyan-500 animate-analysis" style="animation-delay: ${i*0.1}s">
                            <div class="absolute top-0 right-0 p-2"><span class="bg-red-600 text-[7px] px-2 py-1 rounded font-black italic shadow-lg">HOT MATCH</span></div>
                            
                            <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4 pt-2">
                                <div class="w-2/5 text-center">
                                    <p class="text-[7px] text-gray-500 font-black mb-1">${currentLeague}</p>
                                    <p class="font-black text-[11px] text-white tracking-tight">${home}</p>
                                </div>
                                <div class="w-1/5 text-center text-gray-700 font-black italic text-xs">VS</div>
                                <div class="w-2/5 text-center">
                                    <p class="text-[7px] text-cyan-500 font-black mb-1">Poisson Algorithm</p>
                                    <p class="font-black text-[11px] text-white tracking-tight">${away}</p>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-x-10 gap-y-4 text-[10px]">
                                <div class="space-y-3">
                                    <div class="flex justify-between border-b border-gray-800 pb-1"><span class="text-gray-500 font-bold">1X2:</span> <span class="text-cyan-400 font-black">${oneX2}</span></div>
                                    <div class="flex justify-between border-b border-gray-800 pb-1"><span class="text-gray-500 font-bold">DOUBLE CHANCE:</span> <span class="text-white font-bold">${oneX2 == '1' ? '1X' : (oneX2 == '2' ? 'X2' : '12')}</span></div>
                                    <div class="flex justify-between border-b border-gray-800 pb-1"><span class="text-gray-400 font-bold">SCORE EXACT:</span> <span class="text-yellow-500 font-black italic">${finalS1}-${finalS2}</span></div>
                                    <div class="flex justify-between border-b border-gray-800 pb-1"><span class="text-gray-500 font-bold">O/U 2.5:</span> <span class="text-white font-bold">${total > 2.5 ? 'OVER' : 'UNDER'}</span></div>
                                </div>
                                <div class="space-y-3">
                                    <div class="flex justify-between border-b border-gray-800 pb-1"><span class="text-gray-500 font-bold">1X2 HT:</span> <span class="text-white font-bold">1</span></div>
                                    <div class="flex justify-between border-b border-gray-800 pb-1"><span class="text-gray-500 font-bold">SCORE MT:</span> <span class="text-white font-bold">${Math.floor(finalS1/2)}-${Math.floor(finalS2/2)}</span></div>
                                    <div class="flex justify-between border-b border-gray-800 pb-1"><span class="text-gray-400 font-bold">BTTS:</span> <span class="text-yellow-500 font-black">${btts}</span></div>
                                    <div class="flex justify-between border-b border-gray-800 pb-1"><span class="text-gray-500 font-bold">MULTI-GOALS:</span> <span class="text-white font-bold italic">1-3</span></div>
                                </div>
                            </div>

                            <div class="mt-5 pt-3 border-t border-gray-800 flex justify-between items-center">
                                <span class="text-[8px] text-gray-600 font-black uppercase tracking-widest italic">Confidence: 69% (Mathematical)</span>
                                <span class="text-green-500 font-black text-[9px] italic">ANALYSE FENO ✓</span>
                            </div>
                        </div>
                    `;
                }
            });
            showPage('result-page');
        }
    </script>
</body>
</html>
